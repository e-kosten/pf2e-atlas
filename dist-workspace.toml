[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = []
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Where to host releases
hosting = "github"
# The release helper creates a draft release with human-written notes first.
create-release = false
# Keep platform failures visible without cancelling other target builds.
fail-fast = false
# Atlas keeps a custom GitHub workflow that wraps cargo-dist with repo-owned
# installer and draft-publication policy.
allow-dirty = ["ci"]
