[workspace]
members = [
  "crates/atlas-cli",
  "crates/atlas-domain",
  "crates/atlas-index",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT"
publish = false
rust-version = "1.95"

[workspace.dependencies]
atlas-domain = { path = "crates/atlas-domain" }
atlas-index = { path = "crates/atlas-index" }
rusqlite = { version = "0.37.0", features = ["bundled"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
