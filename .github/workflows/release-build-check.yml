name: release build check

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to use for cargo-dist metadata, such as v0.1.0-rc.2. Defaults to v<atlas-cli version>."
        required: false
        type: string
  push:
    branches:
      - "release-build-check/**"
      - "release-build-check-*"

permissions:
  contents: read

concurrency:
  group: release-build-check-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DIST_VERSION: "0.31.0"

jobs:
  prepare:
    name: prepare build check
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Release tool smoke tests
        shell: bash
        run: |
          scripts/release/validate-release-tooling.sh
          scripts/release/test-release-tools.sh
          scripts/release/test-prepare-release.sh
      - id: version
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          crate_version="$(awk -F '"' '/^version = / { print $2; exit }' crates/atlas-cli/Cargo.toml)"
          if [[ -n "${INPUT_TAG:-}" ]]; then
            tag="$INPUT_TAG"
          else
            tag="v$crate_version"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "invalid release-check tag: $tag" >&2
            exit 1
          fi
          version="${tag#v}"
          if [[ "$crate_version" != "$version" ]]; then
            echo "crate version $crate_version does not match release-check tag $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: cargo-dist ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-2022
    steps:
      - uses: actions/checkout@v5
      - name: Install cargo-dist
        if: ${{ matrix.target != 'x86_64-pc-windows-msvc' }}
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf "https://github.com/axodotdev/cargo-dist/releases/download/v${DIST_VERSION}/cargo-dist-installer.sh" | sh
      - name: Install cargo-dist on Windows
        if: ${{ matrix.target == 'x86_64-pc-windows-msvc' }}
        shell: pwsh
        run: irm "https://github.com/axodotdev/cargo-dist/releases/download/v$env:DIST_VERSION/cargo-dist-installer.ps1" | iex
      - name: Generate notices
        if: ${{ matrix.target != 'x86_64-pc-windows-msvc' }}
        shell: bash
        run: python3 scripts/release/generate-notices.py
      - name: Generate notices on Windows
        if: ${{ matrix.target == 'x86_64-pc-windows-msvc' }}
        shell: pwsh
        run: python scripts/release/generate-notices.py
      - name: Validate PowerShell installer
        if: ${{ matrix.target == 'x86_64-pc-windows-msvc' }}
        shell: pwsh
        run: |
          ./scripts/install/atlas-installer.ps1 -DryRun
          ./scripts/release/test-installer.ps1
      - name: Build archives with cargo-dist
        if: ${{ matrix.target != 'x86_64-pc-windows-msvc' }}
        shell: bash
        run: dist build --artifacts local --target "${{ matrix.target }}" --tag "${{ needs.prepare.outputs.tag }}" --print linkage
      - name: Build archives with cargo-dist on Windows
        if: ${{ matrix.target == 'x86_64-pc-windows-msvc' }}
        shell: pwsh
        env:
          RUSTFLAGS: "-C target-feature=-crt-static -C link-arg=/NODEFAULTLIB:libcmt -C link-arg=msvcprt.lib -C link-arg=legacy_stdio_definitions.lib"
        run: dist build --artifacts local --target "${{ matrix.target }}" --tag "${{ needs.prepare.outputs.tag }}" --print linkage
      - name: Upload cargo-dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: package-${{ matrix.target }}
          path: target/distrib/atlas-cli-${{ matrix.target }}.*
          if-no-files-found: error

  assemble:
    name: assemble release assets
    needs: [prepare, build]
    if: ${{ always() && needs.prepare.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-24.04
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: package-*
          path: target/distrib
          merge-multiple: true
      - name: Install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf "https://github.com/axodotdev/cargo-dist/releases/download/v${DIST_VERSION}/cargo-dist-installer.sh" | sh
      - name: Add installers and notices
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/release/generate-notices.py
          cp scripts/install/atlas-installer.sh target/distrib/atlas-installer.sh
          cp scripts/install/atlas-installer.ps1 target/distrib/atlas-installer.ps1
          cp THIRD-PARTY-NOTICES.md target/distrib/THIRD-PARTY-NOTICES.md
      - name: Generate cargo-dist manifest
        shell: bash
        run: |
          dist manifest --artifacts local --tag "$TAG" --allow-dirty --no-local-paths --output-format json > dist-manifest.json
          scripts/release/prune-dist-manifest.py dist-manifest.json target/distrib
          mv dist-manifest.json target/distrib/dist-manifest.json
      - name: Generate manifest and checksums
        shell: bash
        run: scripts/release/generate-release-manifest.py "$TAG" target/distrib
      - name: Validate required assets
        shell: bash
        run: scripts/release/validate-release-assets.sh "$TAG" target/distrib
      - name: Upload assembled release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-build-check-${{ needs.prepare.outputs.tag }}
          path: target/distrib/*
          if-no-files-found: error
